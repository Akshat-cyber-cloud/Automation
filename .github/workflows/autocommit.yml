name: 🤖 Mistral Auto-Commit Bot

on:
  schedule:
    # 23:45 IST = 18:15 UTC  (IST is UTC+5:30)
    - cron: "15 18 * * *"

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    name: Check & Auto-Commit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout the full repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run the bot
      - name: Run Auto-Commit Bot
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER:      ${{ github.repository_owner }}
          REPO_NAME:       ${{ github.event.repository.name }}
          GIT_USER_NAME:   "AutoCommit Bot"
          GIT_USER_EMAIL:  "bot@users.noreply.github.com"
        run: node autocommit.js

      # 5. Print a summary in the Actions UI
      - name: Job summary
        if: always()
        run: |
          echo "## 🤖 Auto-Commit Bot Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "- **Repo:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY